<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>教室時鐘</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Noto+Sans+TC:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0507; /* Very deep, near-black pink */
      --panel: #111827; /* Keeping panel dark */
      --border: #3a1c28; /* Slightly tinted border */
      --accent: #ffb7c5; /* Sakura pink */
      --accent2: #ff7eb9; /* Glow pink */
      --green: #00ff9d;
      --purple: #a78bfa;
      --text: #e2e8f0;
      --dim: #a18a93; /* Dimmed text with slight pink tint */
      --glow: 0 0 10px rgba(255, 183, 197, 0.6), 0 0 20px rgba(255, 126, 185, 0.4), 0 0 40px rgba(255, 126, 185, 0.2);
      --glow2: 0 0 20px rgba(255, 126, 185, 0.5);
      --glowP: 0 0 18px rgba(167,139,250,0.5);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #canvas-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      padding: 32px 16px;
      width: min(800px, 96vw);
    }

    /* ── MODE SWITCHER ── */
    .mode-switcher {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .mode-btn {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.65rem, 1.8vw, 0.82rem);
      padding: 9px 24px;
      border: none;
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      letter-spacing: 0.12em;
      transition: all .25s;
    }
    .mode-btn.active[data-mode="monthly"] {
      color: var(--accent);
      background: rgba(255,183,197,0.08); /* Sakura pink tint */
      text-shadow: 0 0 10px rgba(255,183,197,0.4);
    }
    .mode-btn.active[data-mode="mock"] {
      color: var(--purple);
      background: rgba(167,139,250,0.08);
      text-shadow: 0 0 10px rgba(167,139,250,0.4);
    }
    .mode-divider { width:1px; background:var(--border); }

    /* ── DATE / CLOCK ── */
    .date-line {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.7rem, 2vw, 1rem);
      color: var(--dim);
      letter-spacing: 0.2em;
    }
    .digital {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.4vw;
      width: 100%;
    }
    .d {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(2.8rem, 13.5vw, 9rem);
      height: clamp(3.6rem, 17vw, 11.5rem);
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2.6rem, 12.5vw, 8.5rem);
      color: var(--accent);
      text-shadow: var(--glow);
      line-height: 1;
      flex-shrink: 0;
    }
    .colon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: clamp(1rem, 4vw, 2.8rem);
      height: clamp(3.6rem, 17vw, 11.5rem);
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2rem, 9vw, 6rem);
      color: var(--accent);
      text-shadow: var(--glow);
      animation: blink 1s step-end infinite;
      flex-shrink: 0;
      padding-bottom: 0.1em;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }
    .weekday { font-size: clamp(0.8rem, 2.5vw, 1.1rem); color: var(--dim); letter-spacing: 0.2em; }

    .divider {
      width: 100%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), var(--accent), var(--border), transparent);
    }

    /* ── PANEL ── */
    .exam-panel {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .exam-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
    }
    .exam-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.75rem, 2vw, 0.95rem);
      color: var(--accent);
      letter-spacing: 0.15em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .exam-title::before {
      content: '';
      width: 8px; height: 8px;
      border-radius: 50%;
      background: currentColor;
      box-shadow: 0 0 10px currentColor;
    }
    .exam-title.mock { color: var(--purple); }

    /* toggle */
    .toggle-wrap {
      display: flex; align-items: center; gap: 10px;
      font-size: 0.85rem; color: var(--dim);
      cursor: pointer; user-select: none;
    }
    .toggle { position: relative; width: 48px; height: 26px; }
    .toggle input { display: none; }
    .toggle-track {
      position: absolute; inset: 0;
      background: #1e293b;
      border: 1px solid var(--border);
      border-radius: 99px;
      transition: background .3s, border-color .3s;
    }
    .toggle-thumb {
      position: absolute; top: 3px; left: 3px;
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--dim);
      transition: transform .3s, background .3s, box-shadow .3s;
    }
    /* monthly toggle */
    #examToggle:checked ~ .toggle-track { background:#0a2a3a; border-color:var(--accent); }
    #examToggle:checked ~ .toggle-thumb { transform:translateX(22px); background:var(--accent); box-shadow:var(--glow); }
    /* mock toggle */
    #mockToggle:checked ~ .toggle-track { background:#130e24; border-color:var(--purple); }
    #mockToggle:checked ~ .toggle-thumb { transform:translateX(22px); background:var(--purple); box-shadow:var(--glowP); }

    /* small pill buttons */
    .pb, .db {
      font-family: 'Orbitron', monospace;
      font-size: 0.75rem;
      padding: 5px 11px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--dim);
      cursor: pointer;
      transition: all .2s;
    }
    .pb:hover { border-color: var(--accent); color: var(--accent); }
    .pb.active-blue { border-color:var(--accent2); color:var(--accent2); background:rgba(255,107,53,0.08); box-shadow:var(--glow2); }
    .pb.active-purple { border-color:var(--purple); color:var(--purple); background:rgba(167,139,250,0.08); }
    .db:hover { border-color: var(--green); color: var(--green); }
    .db.active { border-color:var(--green); color:var(--green); background:rgba(0,255,157,0.08); box-shadow:0 0 14px rgba(0,255,157,0.3); }

    /* period row */
    .period-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
    .period-label { font-size:0.85rem; color:var(--dim); white-space:nowrap; }
    .period-btns { display:flex; gap:6px; flex-wrap:wrap; }

    /* ── COUNTDOWN BOX ── */
    .countdown-box {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-radius: 10px;
    }
    .countdown-box.visible { display: flex; }
    /* monthly */
    .countdown-box.monthly-box {
      background: rgba(255,107,53,0.05);
      border: 1px solid rgba(255,107,53,0.2);
    }
    /* mock */
    .countdown-box.mock-box {
      background: rgba(167,139,250,0.05);
      border: 1px solid rgba(167,139,250,0.2);
    }

    .countdown-label { font-size:0.8rem; letter-spacing:0.15em; }
    .monthly-box .countdown-label { color: var(--accent2); }
    .mock-box    .countdown-label { color: var(--purple); }

    .countdown-time {
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2.5rem, 12vw, 6rem);
      line-height: 1;
      width: 3.7em;
      flex-shrink: 0;
    }
    .cd {
      display: inline-flex; align-items: center; justify-content: center;
      width: 0.8em; flex-shrink: 0;
    }
    .cd-colon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 0.5em; flex-shrink: 0; padding-bottom: 0.1em;
    }
    .monthly-box .cd, .monthly-box .cd-colon { color:var(--accent2); text-shadow:var(--glow2); }
    .mock-box    .cd, .mock-box    .cd-colon { color:var(--purple);  text-shadow:var(--glowP); }

    .countdown-time.urgent .cd,
    .countdown-time.urgent .cd-colon {
      color: #ff3b3b !important;
      text-shadow: 0 0 20px rgba(255,59,59,0.6) !important;
    }
    .countdown-time.urgent { animation: pulse 0.5s ease-in-out infinite alternate; }
    @keyframes pulse { to { opacity: 0.55; } }

    .break-msg {
      font-family: 'Orbitron', monospace;
      font-weight: 900;
      font-size: clamp(2.5rem, 12vw, 6rem);
      letter-spacing: 0.1em;
    }
    .monthly-box .break-msg { color:var(--accent2); text-shadow:var(--glow2); }
    .mock-box    .break-msg { color:var(--purple);  text-shadow:var(--glowP); }

    .countdown-bar-wrap { width:100%; height:5px; border-radius:99px; overflow:hidden; }
    .monthly-box .countdown-bar-wrap { background:rgba(255,107,53,0.15); }
    .mock-box    .countdown-bar-wrap { background:rgba(167,139,250,0.15); }

    .countdown-bar { height:100%; border-radius:99px; transition:width 1s linear; }
    .monthly-box .countdown-bar { background:linear-gradient(90deg, var(--accent2), #ff3b3b); }
    .mock-box    .countdown-bar { background:linear-gradient(90deg, var(--purple), #7c3aed); }

    .period-info { font-size:0.78rem; color:var(--dim); }

    .status-off { text-align:center; color:var(--dim); font-size:0.82rem; padding:8px; }

    /* ── 模擬考科目 badge ── */
    .subject-badge {
      display: none;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 5px 16px;
      border-radius: 8px;
      border: 1px solid rgba(167,139,250,0.3);
      background: rgba(167,139,250,0.07);
      font-family: 'Orbitron', monospace;
      font-size: clamp(0.75rem, 2vw, 0.88rem);
      color: var(--purple);
      letter-spacing: 0.1em;
    }
    .subject-badge.visible { display: flex; }
    .subject-dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--purple); box-shadow:var(--glowP); flex-shrink:0;
    }
  </style>
</head>
<body>
<div id="canvas-container">
  <canvas id="sakura-canvas"></canvas>
</div>
<div class="container">

  <!-- MODE SWITCHER -->
  <div class="mode-switcher">
    <button class="mode-btn active" data-mode="monthly" id="btnMonthly">月　考</button>
    <div class="mode-divider"></div>
    <button class="mode-btn" data-mode="mock" id="btnMock">模擬考</button>
  </div>

  <div class="date-line" id="dateLine"></div>

  <div class="digital">
    <span class="d" id="h0">0</span><span class="d" id="h1">0</span>
    <span class="colon">:</span>
    <span class="d" id="m0">0</span><span class="d" id="m1">0</span>
    <span class="colon">:</span>
    <span class="d" id="s0">0</span><span class="d" id="s1">0</span>
  </div>

  <div class="weekday" id="weekday"></div>
  <div class="divider"></div>

  <!-- ══ 月考 PANEL ══ -->
  <div class="exam-panel" id="panelMonthly">
    <div class="exam-header">
      <div class="exam-title">考試剩餘時間</div>
      <label class="toggle-wrap">
        <div class="toggle">
          <input type="checkbox" id="examToggle" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </div>
        開啟
      </label>
    </div>

    <div id="examControls" style="display:none; flex-direction:column; gap:12px;">
      <div class="period-row">
        <span class="period-label">考試時長：</span>
        <div class="period-btns" id="durationBtns"></div>
      </div>
      <div class="countdown-box monthly-box" id="countdownBox">
        <div class="countdown-label" id="countdownLabel">第 1 節剩餘</div>
        <div class="countdown-time" id="countdownTime">
          <span class="cd" id="cd0">-</span><span class="cd" id="cd1">-</span>
          <span class="cd-colon">:</span>
          <span class="cd" id="cd2">-</span><span class="cd" id="cd3">-</span>
        </div>
        <div class="break-msg" id="breakMsg" style="display:none;"></div>
        <div class="countdown-bar-wrap"><div class="countdown-bar" id="countdownBar" style="width:100%"></div></div>
        <div class="period-info" id="periodInfo"></div>
      </div>
    </div>

    <div class="status-off" id="statusOff">開啟開關以顯示考試剩餘時間</div>
  </div>

  <!-- ══ 模擬考 PANEL ══ -->
  <div class="exam-panel" id="panelMock" style="display:none;">
    <div class="exam-header">
      <div class="exam-title mock">模擬考剩餘時間</div>
      <label class="toggle-wrap">
        <div class="toggle">
          <input type="checkbox" id="mockToggle" />
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </div>
        開啟
      </label>
    </div>

    <!-- 天次選擇 -->
    <div class="period-row" id="mockDayRow">
      <span class="period-label">考試天次：</span>
      <div class="period-btns">
        <button class="pb active-purple" id="btnDay1">第一天</button>
        <button class="pb" id="btnDay2">第二天</button>
      </div>
    </div>

    <!-- 科目 badge -->
    <div class="subject-badge" id="subjectBadge">
      <div class="subject-dot"></div>
      <span id="subjectName">—</span>
    </div>

    <div class="countdown-box mock-box" id="mockCountdownBox">
      <div class="countdown-label" id="mockLabel">剩餘時間</div>
      <div class="countdown-time" id="mockTime">
        <span class="cd" id="mcd0">-</span><span class="cd" id="mcd1">-</span>
        <span class="cd-colon">:</span>
        <span class="cd" id="mcd2">-</span><span class="cd" id="mcd3">-</span>
      </div>
      <div class="break-msg" id="mockBreakMsg" style="display:none;"></div>
      <div class="countdown-bar-wrap"><div class="countdown-bar" id="mockBar" style="width:100%"></div></div>
      <div class="period-info" id="mockInfo"></div>
    </div>

    <div class="status-off" id="mockStatusOff">開啟開關以顯示模擬考剩餘時間</div>
  </div>

</div>
<script>
  // ═══════════════════════════════════
  //  月考資料
  // ═══════════════════════════════════
  const PERIODS = [
    { label:'1', start:[8,10]  },
    { label:'2', start:[9,10]  },
    { label:'3', start:[10,10] },
    { label:'4', start:[11,10] },
    { label:'5', start:[13,5]  },
    { label:'6', start:[14,5]  },
    { label:'7', start:[15,10] },
  ];
  const PERIOD_DURATIONS = [
    [50,80,100],[50,80,100],[50,80,100],[50],
    [50,80,100],[50,80,100],[50],
  ];

  // ═══════════════════════════════════
  //  模擬考資料（固定）
  //  第一天：國文08:20(100分)、英文10:20(100分)、專業科目(一)13:10(100分)
  //  第二天：數學08:20(80分)、專業科目(二)10:20(100分)
  // ═══════════════════════════════════
  const MOCK_SCHEDULE = {
    day1: [
      { subject:'國　文',      start:[8,20],  duration:100 },
      { subject:'英　文',      start:[10,20], duration:100 },
      { subject:'專業科目（一）', start:[13,10], duration:100 },
    ],
    day2: [
      { subject:'數　學',      start:[8,20],  duration:80  },
      { subject:'專業科目（二）', start:[10,20], duration:100 },
    ],
  };

  const WEEKDAYS = ['日','一','二','三','四','五','六'];
  const DAYS_EN  = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

  // ── 狀態 ──
  let currentMode    = 'monthly';
  let examOn         = false, selectedPeriod = null, selectedDuration = 50;
  let mockOn         = false, mockDay = 'day1';

  // ── DOM ──
  const examToggle    = document.getElementById('examToggle');
  const examControls  = document.getElementById('examControls');
  const statusOff     = document.getElementById('statusOff');
  const countdownBox  = document.getElementById('countdownBox');
  const countdownLabel= document.getElementById('countdownLabel');
  const countdownTime = document.getElementById('countdownTime');
  const countdownBar  = document.getElementById('countdownBar');
  const periodInfo    = document.getElementById('periodInfo');
  const durationBtnsEl= document.getElementById('durationBtns');

  const mockToggle    = document.getElementById('mockToggle');
  const mockStatusOff = document.getElementById('mockStatusOff');
  const mockCDBox     = document.getElementById('mockCountdownBox');
  const mockLabel     = document.getElementById('mockLabel');
  const mockTime      = document.getElementById('mockTime');
  const mockBar       = document.getElementById('mockBar');
  const mockBreakMsg  = document.getElementById('mockBreakMsg');
  const mockInfo      = document.getElementById('mockInfo');
  const subjectBadge  = document.getElementById('subjectBadge');
  const subjectName   = document.getElementById('subjectName');

  // ─────────────────────────────
  //  MODE 切換
  // ─────────────────────────────
  document.getElementById('btnMonthly').addEventListener('click', () => setMode('monthly'));
  document.getElementById('btnMock').addEventListener('click',    () => setMode('mock'));
  function setMode(mode) {
    currentMode = mode;
    document.getElementById('btnMonthly').classList.toggle('active', mode==='monthly');
    document.getElementById('btnMock').classList.toggle('active',    mode==='mock');
    document.getElementById('panelMonthly').style.display = mode==='monthly' ? '' : 'none';
    document.getElementById('panelMock').style.display    = mode==='mock'    ? '' : 'none';
  }

  // ─────────────────────────────
  //  月考邏輯（原有）
  // ─────────────────────────────
  function rebuildDurationBtns(periodIdx) {
    durationBtnsEl.innerHTML = '';
    const durations = PERIOD_DURATIONS[periodIdx] || [50];
    if (!durations.includes(selectedDuration)) selectedDuration = 50;
    durations.forEach(d => {
      const btn = document.createElement('button');
      btn.className = 'db' + (d===selectedDuration ? ' active' : '');
      btn.textContent = `${d} 分`;
      btn.addEventListener('click', () => {
        selectedDuration = d;
        document.querySelectorAll('.db').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        autoSelectPeriod();
      });
      durationBtnsEl.appendChild(btn);
    });
  }
  rebuildDurationBtns(0);

  function selectPeriod(i) {
    selectedPeriod = i;
    rebuildDurationBtns(i);
    countdownBox.classList.add('visible');
  }

  function detectPeriod(nowSec) {
    for (let i=0; i<PERIODS.length; i++) {
      const s = PERIODS[i].start[0]*3600 + PERIODS[i].start[1]*60;
      if (nowSec >= s && nowSec < s + selectedDuration*60) return i;
    }
    for (let i=0; i<PERIODS.length; i++) {
      const s = PERIODS[i].start[0]*3600 + PERIODS[i].start[1]*60;
      if (nowSec < s) return i;
    }
    return PERIODS.length - 1;
  }

  function autoSelectPeriod() {
    const now = new Date();
    selectPeriod(detectPeriod(now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds()));
  }

  examToggle.addEventListener('change', () => {
    examOn = examToggle.checked;
    examControls.style.display = examOn ? 'flex' : 'none';
    statusOff.style.display    = examOn ? 'none' : 'block';
    if (examOn) { autoSelectPeriod(); }
    else { selectedPeriod = null; countdownBox.classList.remove('visible'); }
  });

  function pad(n){ return String(n).padStart(2,'0'); }

  function examEndSec(idx) {
    return PERIODS[idx].start[0]*3600 + PERIODS[idx].start[1]*60 + selectedDuration*60;
  }

  function isBreakTime(nowSec) {
    const p = PERIODS[selectedPeriod];
    const pStart = p.start[0]*3600 + p.start[1]*60;
    if (nowSec < pStart) return true;
    const eEnd = examEndSec(selectedPeriod);
    if (nowSec < eEnd) return false;
    for (let i=0; i<PERIODS.length; i++) {
      const s = PERIODS[i].start[0]*3600 + PERIODS[i].start[1]*60;
      if (s > eEnd && nowSec < s) return true;
    }
    return false;
  }

  function nextPeriodAfterExam() {
    const pStart = PERIODS[selectedPeriod].start[0]*3600 + PERIODS[selectedPeriod].start[1]*60;
    const nowSec = (new Date()).getHours()*3600 + (new Date()).getMinutes()*60 + (new Date()).getSeconds();
    if (nowSec < pStart) return PERIODS[selectedPeriod];
    const eEnd = examEndSec(selectedPeriod);
    for (let i=0; i<PERIODS.length; i++) {
      const s = PERIODS[i].start[0]*3600 + PERIODS[i].start[1]*60;
      if (s > eEnd) return PERIODS[i];
    }
    return null;
  }

  function setCDText(a,b,c,d) {
    ['cd0','cd1','cd2','cd3'].forEach((id,i)=>document.getElementById(id).textContent=[a,b,c,d][i]);
  }

  function showMonthlyMsg(label, msg, info='') {
    countdownLabel.textContent = label;
    countdownTime.style.display = 'none';
    countdownTime.classList.remove('urgent');
    const bm = document.getElementById('breakMsg');
    bm.textContent = msg; bm.style.display = 'block';
    countdownBar.style.width = '0%';
    periodInfo.textContent = info;
  }

  function updateMonthly(now) {
    if (!examOn || selectedPeriod === null) return;
    const p = PERIODS[selectedPeriod];
    const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    const eEnd   = examEndSec(selectedPeriod);
    const endH = Math.floor(eEnd/3600), endM = Math.floor((eEnd%3600)/60);

    if (selectedPeriod === PERIODS.length-1 && nowSec >= eEnd) {
      showMonthlyMsg('今日考試已結束','放學囉'); return;
    }
    if (isBreakTime(nowSec)) {
      const next = nextPeriodAfterExam();
      showMonthlyMsg('下課時間','下課中',
        next ? `下一節 第${next.label}節 ${pad(next.start[0])}:${pad(next.start[1])} 開始` : '');
      return;
    }

    countdownTime.style.display = 'flex';
    document.getElementById('breakMsg').style.display = 'none';
    countdownLabel.textContent = `第 ${p.label} 節剩餘`;
    const rem = eEnd - nowSec;
    if (rem <= 0) {
      setCDText('已','結','束','');
      countdownTime.classList.remove('urgent');
      countdownBar.style.width = '0%';
      periodInfo.textContent = '';
    } else {
      const mm=pad(Math.floor(rem/60)), ss=pad(rem%60);
      setCDText(mm[0],mm[1],ss[0],ss[1]);
      countdownTime.classList.toggle('urgent', rem<=300);
      countdownBar.style.width = Math.min(100, rem/(selectedDuration*60)*100)+'%';
      periodInfo.textContent = `${pad(p.start[0])}:${pad(p.start[1])} ～ ${pad(endH)}:${pad(endM)}`;
    }
  }

  // ─────────────────────────────
  //  模擬考邏輯（新增）
  // ─────────────────────────────
  document.getElementById('btnDay1').addEventListener('click', () => setMockDay('day1'));
  document.getElementById('btnDay2').addEventListener('click', () => setMockDay('day2'));

  function setMockDay(day) {
    mockDay = day;
    document.getElementById('btnDay1').className = 'pb' + (day==='day1' ? ' active-purple' : '');
    document.getElementById('btnDay2').className = 'pb' + (day==='day2' ? ' active-purple' : '');
  }

  mockToggle.addEventListener('change', () => {
    mockOn = mockToggle.checked;
    mockStatusOff.style.display = mockOn ? 'none' : 'block';
    if (mockOn) {
      mockCDBox.classList.add('visible');
      subjectBadge.classList.add('visible');
    } else {
      mockCDBox.classList.remove('visible');
      subjectBadge.classList.remove('visible');
    }
  });

  // 取得模擬考當前狀態
  function getMockState(nowSec) {
    const schedule = MOCK_SCHEDULE[mockDay];
    // 正在考試中？
    for (let i=0; i<schedule.length; i++) {
      const s = schedule[i].start[0]*3600 + schedule[i].start[1]*60;
      const e = s + schedule[i].duration*60;
      if (nowSec >= s && nowSec < e)
        return { status:'active', item:schedule[i], startSec:s, endSec:e };
    }
    // 尚未開始或下課中？
    for (let i=0; i<schedule.length; i++) {
      const s = schedule[i].start[0]*3600 + schedule[i].start[1]*60;
      if (nowSec < s)
        return { status: i===0 ? 'before' : 'between', item:schedule[i], nextSec:s };
    }
    return { status:'done' };
  }

  function setMockCDText(a,b,c,d) {
    ['mcd0','mcd1','mcd2','mcd3'].forEach((id,i)=>document.getElementById(id).textContent=[a,b,c,d][i]);
  }

  function showMockMsg(label, msg, info='', subject='') {
    mockLabel.textContent = label;
    mockTime.style.display = 'none';
    mockTime.classList.remove('urgent');
    mockBreakMsg.textContent = msg; mockBreakMsg.style.display = 'block';
    mockBar.style.width = '0%';
    mockInfo.textContent = info;
    if (subject) subjectName.textContent = subject;
  }

  function updateMock(now) {
    if (!mockOn) return;
    const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
    const state  = getMockState(nowSec);

    if (state.status === 'done') {
      showMockMsg('今日模擬考已結束','放學囉','','—');
      return;
    }

    if (state.status === 'before' || state.status === 'between') {
      const nh = Math.floor(state.nextSec/3600), nm = Math.floor((state.nextSec%3600)/60);
      showMockMsg(
        state.status==='before' ? '考試尚未開始' : '下課中',
        '下課中',
        `下一科　${state.item.subject}　${pad(nh)}:${pad(nm)} 開始`,
        state.item.subject
      );
      return;
    }

    // active：只顯示剩餘時間，不可提早交卷（無「可提早交卷」概念）
    mockTime.style.display = 'flex';
    mockBreakMsg.style.display = 'none';
    mockLabel.textContent = state.item.subject + '　剩餘';
    subjectName.textContent = state.item.subject;

    const rem = state.endSec - nowSec;
    if (rem <= 0) {
      setMockCDText('已','結','束','');
      mockTime.classList.remove('urgent');
      mockBar.style.width = '0%';
      mockInfo.textContent = '';
    } else {
      const mm=pad(Math.floor(rem/60)), ss=pad(rem%60);
      setMockCDText(mm[0],mm[1],ss[0],ss[1]);
      mockTime.classList.toggle('urgent', rem<=600); // 最後10分鐘警示
      mockBar.style.width = Math.min(100, rem/(state.item.duration*60)*100)+'%';
      const sH=Math.floor(state.startSec/3600), sM=Math.floor((state.startSec%3600)/60);
      const eH=Math.floor(state.endSec/3600),   eM=Math.floor((state.endSec%3600)/60);
      mockInfo.textContent = `${pad(sH)}:${pad(sM)} ～ ${pad(eH)}:${pad(eM)}`;
    }
  }

  // ─────────────────────────────
  //  主 tick
  // ─────────────────────────────
  function tick() {
    const now = new Date();
    document.getElementById('h0').textContent = pad(now.getHours())[0];
    document.getElementById('h1').textContent = pad(now.getHours())[1];
    document.getElementById('m0').textContent = pad(now.getMinutes())[0];
    document.getElementById('m1').textContent = pad(now.getMinutes())[1];
    document.getElementById('s0').textContent = pad(now.getSeconds())[0];
    document.getElementById('s1').textContent = pad(now.getSeconds())[1];
    document.getElementById('dateLine').textContent =
      `${now.getFullYear()} · ${pad(now.getMonth()+1)} · ${pad(now.getDate())}`;
    document.getElementById('weekday').textContent =
      `星期${WEEKDAYS[now.getDay()]}  ·  ${DAYS_EN[now.getDay()]}`;

    if (examOn) {
      const nowSec = now.getHours()*3600 + now.getMinutes()*60 + now.getSeconds();
      const correct = detectPeriod(nowSec);
      if (correct !== selectedPeriod) selectPeriod(correct);
    }
    updateMonthly(now);
    updateMock(now);
  }

  tick();
  setInterval(tick, 1000);

  // ═══════════════════════════════════
  //  櫻花飛舞動畫邏輯
  // ═══════════════════════════════════
  const canvas = document.getElementById('sakura-canvas');
  const ctx = canvas.getContext('2d');

  let width, height, petals;

  // Petal configuration
  const PETAL_COUNT = 60;
  const COLORS = ['#ffb7c5', '#ffc0cb', '#ffe4e1', '#ff99aa'];

  function initCanvas() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    petals = [];
    for (let i = 0; i < PETAL_COUNT; i++) {
      petals.push(new Petal());
    }
  }

  class Petal {
    constructor() {
      this.reset();
    }

    reset() {
      this.x = Math.random() * width;
      this.y = Math.random() * height - height;
      this.size = Math.random() * 5 + 2;
      this.speed = Math.random() * 1 + 0.5;
      this.swing = Math.random() * 2;
      this.swingSpeed = Math.random() * 0.02;
      this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
      this.opacity = Math.random() * 0.5 + 0.3;
      this.flip = Math.random();
      this.flipSpeed = Math.random() * 0.03;
    }

    update() {
      this.y += this.speed;
      this.x += Math.sin(this.swing);
      this.swing += this.swingSpeed;
      this.flip += this.flipSpeed;

      if (this.y > height) {
        this.reset();
      }
    }

    draw() {
      ctx.save();
      ctx.translate(this.x, this.y);
      ctx.rotate(this.swing);
      // Draw petal shape (ellipse-like)
      ctx.scale(Math.sin(this.flip), 1);
      ctx.beginPath();
      ctx.fillStyle = this.color;
      ctx.globalAlpha = this.opacity;

      // Draw a simple heart/petal shape
      ctx.moveTo(0, 0);
      ctx.bezierCurveTo(this.size, -this.size, this.size * 2, this.size, 0, this.size * 2);
      ctx.bezierCurveTo(-this.size * 2, this.size, -this.size, -this.size, 0, 0);

      ctx.fill();
      ctx.restore();
    }
  }

  function animate() {
    ctx.clearRect(0, 0, width, height);

    // Gentle gradient background overlay for depth
    const grad = ctx.createRadialGradient(width/2, height/2, 0, width/2, height/2, width);
    grad.addColorStop(0, 'rgba(45, 10, 21, 0)');
    grad.addColorStop(1, 'rgba(10, 5, 7, 0.8)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, width, height);

    petals.forEach(petal => {
      petal.update();
      petal.draw();
    });
    requestAnimationFrame(animate);
  }

  window.addEventListener('resize', initCanvas);
  initCanvas();
  animate();

</script>
</body>
